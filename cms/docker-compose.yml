version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: astauria-cms-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: astauria_cms
    ports:
      - "5441:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: astauria-cms-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/astauria_cms?schema=public
      JWT_SECRET: ${JWT_SECRET:-astauria-cms-super-secret-change-me}
      ADMIN_URL: http://localhost:5173
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  # React Admin (Development)
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: astauria-cms-admin
    ports:
      - "5173:5173"
    volumes:
      - ./apps/admin:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
